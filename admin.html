<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusOne Admin Card Setup</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=Space+Grotesk:wght@500;700&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020617;
            --grid-color: rgba(168, 85, 247, 0.05);
            --card-bg: rgba(15, 23, 42, 0.75);
            --border-color: rgba(51, 65, 85, 0.4);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #a855f7; /* Purple */
            --accent-gradient: linear-gradient(135deg, #a855f7 0%, #d946ef 100%);
            --accent-glow: rgba(168, 85, 247, 0.25);
            --input-bg: #090d1f;
            --shadow-color: rgba(0, 0, 0, 0.6);
            --panel-blur: blur(16px);
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --grid-color: rgba(168, 85, 247, 0.05);
            --card-bg: rgba(255, 255, 255, 0.85);
            --border-color: rgba(203, 213, 225, 0.7);
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --accent-color: #9333ea;
            --accent-gradient: linear-gradient(135deg, #9333ea 0%, #c084fc 100%);
            --accent-glow: rgba(147, 51, 234, 0.15);
            --input-bg: #ffffff;
            --shadow-color: rgba(148, 163, 184, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(var(--grid-color) 1px, transparent 1px),
                radial-gradient(var(--grid-color) 1px, transparent 1px);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            backdrop-filter: var(--panel-blur);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 36px;
            box-shadow: 0 10px 45px var(--shadow-color);
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        p {
            font-size: 0.875rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
        }

        input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .btn {
            width: 100%;
            background: var(--accent-gradient);
            border: none;
            color: #ffffff;
            font-weight: 700;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            box-shadow: 0 4px 15px var(--accent-glow);
            margin-top: 10px;
            transition: all 0.2s ease;
        }

        .btn:hover {
            opacity: 0.95;
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        .btn:active {
            transform: scale(0.99);
        }

        .status-toast {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
        }

        .theme-toggle:hover {
            border-color: var(--accent-color);
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
        <svg id="themeIconSun" style="display:none;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="themeIconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>

    <div class="container">
        <div class="header">
            <h2>Admin Card Setup</h2>
            <p>Link a physical NFC card UID directly to a student's profile inside the cashless cloud ledger.</p>
        </div>

        <form id="registerForm" onsubmit="registerNewCard(event)">
            <div class="form-group">
                <label for="studentName">Student's Full Name</label>
                <input type="text" id="studentName" required placeholder="e.g. Alex Mercer">
            </div>

            <div class="form-group">
                <label for="cardUid">NFC Card UID</label>
                <input type="text" id="cardUid" required placeholder="Hold card to reader or enter manually">
            </div>

            <button type="submit" class="btn">Assign & Activate Card Permission</button>
        </form>

        <div class="status-toast" id="statusToast"></div>
    </div>

    <script>
        async function registerNewCard(event) {
            event.preventDefault();
            const name = document.getElementById('studentName').value;
            const uid = document.getElementById('cardUid').value;
            const toast = document.getElementById('statusToast');

            toast.style.display = 'none';

            try {
                const res = await fetch('/api/admin/register-card', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ studentName: name, cardUid: uid })
                });
                
                const data = await res.json();
                
                if (res.ok && data.success) {
                    toast.style.background = 'rgba(16, 185, 129, 0.1)';
                    toast.style.borderColor = 'rgba(16, 185, 129, 0.3)';
                    toast.style.color = '#10b981';
                    toast.style.border = '1px solid';
                    toast.innerHTML = `✅ Card link successful! Student linked.`;
                    toast.style.display = 'block';

                    document.getElementById('studentName').value = '';
                    document.getElementById('cardUid').value = '';
                } else {
                    throw new Error(data.error || 'Failed to assign card.');
                }
            } catch (err) {
                toast.style.background = 'rgba(239, 68, 68, 0.1)';
                toast.style.borderColor = 'rgba(239, 68, 68, 0.3)';
                toast.style.color = '#ef4444';
                toast.style.border = '1px solid';
                toast.innerHTML = `❌ Error: ${err.message}`;
                toast.style.display = 'block';
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', nextTheme);
            
            const sun = document.getElementById('themeIconSun');
            const moon = document.getElementById('themeIconMoon');
            if (nextTheme === 'light') {
                sun.style.display = 'block';
                moon.style.display = 'none';
            } else {
                sun.style.display = 'none';
                moon.style.display = 'block';
            }
        }
    </script>
</body>
</html>
