<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusOne Canteen Portal</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; background: #f4f7f6; text-align: center; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn { background: #28a745; color: white; padding: 15px 25px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold; }
        .status { margin-top: 20px; font-size: 15px; color: #555; padding: 10px; border-radius: 6px; background: #e9ecef; }
    </style>
</head>
<body>

<div class="container">
    <h2>CampusOne Pay Terminal</h2>
    <p>Select item and tap the student ID card to process payment.</p>
    
    <div style="margin-bottom: 20px;">
        <label for="amount" style="display:block; text-align:left; margin-bottom:5px; font-weight:bold;">Amount (₹):</label>
        <input type="number" id="amount" value="40" style="width:90%; padding:10px; font-size:16px; border-radius:6px; border:1px solid #ccc;">
    </div>

    <button class="btn" onclick="startNfcScan()">Activate NFC Scanner</button>
    <div class="status" id="statusBox">Status: Ready to scan.</div>
</div>

<script>
    // Automatically start listening the millisecond the page loads on the phone
    window.addEventListener('load', () => {
        autoInitializeNfcReader();
    });

    let ndef = null; // Holds our active hardware scanner instance

    async function autoInitializeNfcReader() {
        const statusBox = document.getElementById('statusBox');

        // 1. Verify browser compatibility
        if (!('NDEFReader' in window)) {
            statusBox.style.background = '#f8d7da';
            statusBox.innerHTML = "<strong style='color:#721c24;'>Web NFC Not Supported!</strong><br>Use Chrome on Android over HTTPS.";
            return;
        }

        try {
            // 2. Instantiate and start scanning automatically
            ndef = new NDEFReader();
            await ndef.scan();
            
            statusBox.style.background = '#d4edda';
            statusBox.innerHTML = "<span style='color:#155724;'>⚡ System Live & Automated. Tap a Student ID card anytime!</span>";

            // 3. Keep listening for continuous taps
            ndef.addEventListener("reading", async ({ serialNumber }) => {
                const amount = document.getElementById('amount').value;
                statusBox.style.background = '#cce5ff';
                statusBox.innerHTML = `Card detected: <b>${serialNumber}</b>. Processing transaction...`;

                // 4. Send the auto-captured hardware UID token to the cloud database
                await executePaymentRequest(serialNumber, parseFloat(amount));
            });

            // Handle temporary hardware dropouts or read errors gracefully
            ndef.addEventListener("readingerror", () => {
                statusBox.style.background = '#fff3cd';
                statusBox.innerHTML = "<b style='color:#856404;'>Read Error:</b> Bad tap. Please hold the card steady against the phone.";
            });

        } catch (error) {
            statusBox.style.background = '#fff3cd';
            statusBox.innerHTML = `⚠️ Click anywhere on the screen to grant NFC permissions to the browser.`;
            
            // Browser security fallback: User must touch the screen once if autofocus permissions are restricted
            window.addEventListener('click', async () => {
                if(ndef === null) autoInitializeNfcReader();
            }, { once: true });
        }
    }

    // Alias for button click backwards compatibility
    function startNfcScan() {
        if(ndef === null) {
            autoInitializeNfcReader();
        }
    }

    // Separate function to manage the background API pipeline
    async function executePaymentRequest(cardUid, activeAmount) {
        const statusBox = document.getElementById('statusBox');
        try {
            const response = await fetch('/api/pay', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cardUid: cardUid, amount: activeAmount })
            });
            
            const result = await response.json();
            
            if (result.success) {
                statusBox.style.background = '#d4edda';
                statusBox.innerHTML = `✅ <b>Approved!</b> ${result.studentName}<br>Remaining: ₹${result.newBalance}`;
                
                // Auto-reset back to clean listening mode after 2.5 seconds for the next student
                setTimeout(() => {
                    statusBox.style.background = '#d4edda';
                    statusBox.innerHTML = "<span style='color:#155724;'>⚡ System Live & Automated. Ready for next card...</span>";
                }, 2500);
                
            } else {
                statusBox.style.background = '#f8d7da';
                statusBox.innerHTML = `<strong style='color:#721c24;'>Declined:</strong> ${result.error}`;
            }
        } catch (err) {
            statusBox.innerHTML = "Backend sync failed. Check internet connectivity.";
        }
    }
</script>
</body>
</html>
