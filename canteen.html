<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusOne Canteen Pay Terminal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=Space+Grotesk:wght@500;700&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020617;
            --grid-color: rgba(99, 102, 241, 0.05);
            --card-bg: rgba(15, 23, 42, 0.75);
            --border-color: rgba(51, 65, 85, 0.4);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #6366f1; /* Indigo */
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --accent-glow: rgba(99, 102, 241, 0.25);
            --input-bg: #090d1f;
            --shadow-color: rgba(0, 0, 0, 0.6);
            --panel-blur: blur(16px);
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --grid-color: rgba(99, 102, 241, 0.05);
            --card-bg: rgba(255, 255, 255, 0.85);
            --border-color: rgba(203, 213, 225, 0.7);
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --accent-color: #4f46e5;
            --accent-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            --accent-glow: rgba(79, 70, 229, 0.15);
            --input-bg: #ffffff;
            --shadow-color: rgba(148, 163, 184, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(var(--grid-color) 1px, transparent 1px),
                radial-gradient(var(--grid-color) 1px, transparent 1px);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            backdrop-filter: var(--panel-blur);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 36px;
            box-shadow: 0 10px 45px var(--shadow-color);
            text-align: center;
        }

        .header {
            margin-bottom: 28px;
        }

        h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        p {
            font-size: 0.875rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            outline: none;
            text-align: center;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .btn {
            width: 100%;
            background: var(--accent-gradient);
            border: none;
            color: #ffffff;
            font-weight: 700;
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            box-shadow: 0 4px 15px var(--accent-glow);
            transition: all 0.2s ease;
        }

        .btn:hover {
            opacity: 0.95;
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        .btn:active {
            transform: scale(0.99);
        }

        .status {
            margin-top: 24px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            padding: 16px;
            border-radius: 12px;
            background: rgba(148, 163, 184, 0.1);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            line-height: 1.6;
            word-break: break-word;
            transition: all 0.3s ease;
        }

        .status.success {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.3);
            color: #10b981;
        }

        .status.error {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .status.reading {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
            color: #3b82f6;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
        }

        .theme-toggle:hover {
            border-color: var(--accent-color);
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
        <svg id="themeIconSun" style="display:none;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="themeIconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>

    <div class="container">
        <div class="header">
            <h2>CampusOne Pay Terminal</h2>
            <p>Enter the item price and tap the student ID card against the scanner to process payment.</p>
        </div>
        
        <div class="form-group">
            <label for="amount">Checkout Amount (₹)</label>
            <input type="number" id="amount" value="40" min="1" step="0.5">
        </div>

        <button class="btn" onclick="startNfcScan()">Activate NFC Scanner</button>
        
        <div class="status" id="statusBox">Status: Initializing automated system...</div>
    </div>

    <script>
        window.addEventListener('load', () => {
            autoInitializeNfcReader();
        });

        let ndef = null;

        async function autoInitializeNfcReader() {
            const statusBox = document.getElementById('statusBox');

            if (!('NDEFReader' in window)) {
                statusBox.className = "status error";
                statusBox.innerHTML = "<strong>Web NFC Not Supported!</strong><br>Use Chrome on Android over HTTPS.";
                return;
            }

            try {
                ndef = new NDEFReader();
                await ndef.scan();
                
                statusBox.className = "status success";
                statusBox.innerHTML = "⚡ Canteen system live.<br>Tap a student ID card to process checkout.";

                ndef.addEventListener("reading", async ({ serialNumber }) => {
                    const amount = document.getElementById('amount').value;
                    statusBox.className = "status reading";
                    statusBox.innerHTML = `Card detected: <strong>${serialNumber}</strong><br>Processing transaction...`;

                    await executePaymentRequest(serialNumber, parseFloat(amount));
                });

                ndef.addEventListener("readingerror", () => {
                    statusBox.className = "status error";
                    statusBox.innerHTML = "<strong>Read Error:</strong> Bad tap. Hold card steady against the device.";
                });

            } catch (error) {
                statusBox.className = "status";
                statusBox.innerHTML = "⚠️ Click anywhere on screen to grant NFC sensor permissions.";
                
                window.addEventListener('click', async () => {
                    if (ndef === null) autoInitializeNfcReader();
                }, { once: true });
            }
        }

        function startNfcScan() {
            if (ndef === null) {
                autoInitializeNfcReader();
            }
        }

        async function executePaymentRequest(cardUid, activeAmount) {
            const statusBox = document.getElementById('statusBox');
            try {
                const response = await fetch('/api/canteen/pay', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cardUid: cardUid, item: 'Canteen Item', amount: activeAmount })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    statusBox.className = "status success";
                    statusBox.innerHTML = `✅ <strong>Approved!</strong><br>Student: ${result.studentName}<br>New Balance: ₹${parseFloat(result.remainingBalance).toFixed(2)}`;
                    
                    setTimeout(() => {
                        statusBox.className = "status success";
                        statusBox.innerHTML = "⚡ Canteen system live.<br>Tap a student ID card to process checkout.";
                    }, 3500);
                    
                } else {
                    statusBox.className = "status error";
                    statusBox.innerHTML = `<strong>Declined:</strong><br>${result.error}`;
                }
            } catch (err) {
                statusBox.className = "status error";
                statusBox.innerHTML = "<strong>Network Sync Failure:</strong><br>Verify backend connection.";
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', nextTheme);
            
            const sun = document.getElementById('themeIconSun');
            const moon = document.getElementById('themeIconMoon');
            if (nextTheme === 'light') {
                sun.style.display = 'block';
                moon.style.display = 'none';
            } else {
                sun.style.display = 'none';
                moon.style.display = 'block';
            }
        }
    </script>
</body>
</html>
